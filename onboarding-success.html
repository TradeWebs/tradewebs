<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Submitted | TradeWebs UK</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    .success-container {
      max-width: 600px;
      margin: 140px auto 100px;
      padding: 0 20px;
      text-align: center;
    }
    .success-card {
      background: var(--color-bg-card, #131824);
      border: 1px solid var(--color-border, rgba(255, 255, 255, 0.08));
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(0, 242, 254, 0.15);
      color: #00f2fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 24px;
      border: 2px solid rgba(0, 242, 254, 0.3);
    }
    .success-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      color: #ffffff;
      margin-bottom: 16px;
    }
    .success-desc {
      color: #94a3b8;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-block;
      padding: 14px 32px;
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    .btn-home:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body class="dark-theme">
  <main class="success-container">
    <div class="success-card">
      <div class="success-icon">🚀</div>
      <h1 class="success-title">You're All Set!</h1>
      <p class="success-desc">Thank you for completing your onboarding profile. Our engineering team has received your details and will begin building your custom website immediately.<br><br>We will message you on WhatsApp within 24 hours with your initial design concept!</p>
      <a href="index.html" class="btn-home">Return to Homepage</a>
    </div>
  </main>
</body>
</html>
